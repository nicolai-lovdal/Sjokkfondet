<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sjokkfondet — FrogLab by FutureFrogs</title>
  <meta name="description" content="Når energikriser fyller statskassen og tømmer lommebøkene, bør pengene gå tilbake til de som rammes. Et regelbasert alternativ til ad hoc-politikk.">
  <meta property="og:title" content="Sjokkfondet">
  <meta property="og:description" content="Når energikriser fyller statskassen og tømmer lommebøkene, bør pengene gå tilbake til de som rammes. Forskningsforankret policymodell fra FrogLab by FutureFrogs.">
  <meta property="og:type" content="article">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Serif+4:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAFBFC; }
    input[type="range"] { -webkit-appearance: none; appearance: none; height: 8px; border-radius: 4px; outline: none; background: #E0E2E8; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; background: #0D7377; border: 3px solid #FFFFFF; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    input[type="range"]::-moz-range-thumb { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; background: #0D7377; border: 3px solid #FFFFFF; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    input[type="range"]::-moz-range-track { height: 8px; border-radius: 4px; background: #E0E2E8; }
    input[type="checkbox"] { cursor: pointer; }
    button { cursor: pointer; border: none; }
    a { transition: opacity 0.2s; }
    a:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

const C = {
  bg: "#F7F8FA", card: "#FFFFFF", cardAlt: "#F0F2F5", hover: "#E8F4F4",
  accent: "#0D7377", accentDim: "#0A5C5F",
  green: "#047857", red: "#DC2626",
  blue: "#0D7377", blueL: "#0D7377", teal: "#4338CA",
  yellow: "#D97706", yellowDim: "#B45309",
  purple: "#7C3AED",
  ch1: "#0D7377", ch2: "#4338CA", ch3: "#B45309",
  tx: "#1A1A2E", txD: "#3D3D56", txM: "#71718A",
  border: "#DFE2E8", borderL: "#CFD2D8",
  greenL: "#059669", redL: "#DC2626", purpleDim: "#6D28D9",
};
const F = { d: "'Playfair Display',Georgia,serif", b: "'Source Serif 4',Georgia,serif", u: "'DM Sans',sans-serif" };

const Label = ({children,style}) => <span style={{fontFamily:F.u,fontSize:10,fontWeight:600,letterSpacing:"0.09em",textTransform:"uppercase",color:C.txM,...style}}>{children}</span>;
const P = ({children,style}) => <p style={{fontFamily:F.b,fontSize:14.5,lineHeight:1.72,color:C.txD,margin:"0 0 12px",...style}}>{children}</p>;
const Sec = ({title,icon,children,accent:a}) => (
  <div style={{background:C.card,borderRadius:14,padding:"20px 16px 18px",marginBottom:20,border:`1px solid ${a||C.border}`,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
    {title&&<h2 style={{fontFamily:F.d,fontSize:18,fontWeight:700,color:C.tx,margin:"0 0 14px",display:"flex",alignItems:"center",gap:8}}>
      {icon&&<span style={{fontSize:17}}>{icon}</span>}{title}</h2>}
    {children}
  </div>
);
const Acc = ({title,tag,children}) => {
  const [o,setO]=useState(false);
  return <div style={{background:o?C.hover:C.cardAlt,border:`1px solid ${o?C.accent:C.border}`,borderRadius:9,padding:"12px 15px",marginBottom:8,cursor:"pointer",transition:"all 0.2s"}} onClick={()=>setO(!o)}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:7,flex:1,minWidth:0}}>
        {tag&&<span style={{background:tag.c+"18",color:tag.c,padding:"1px 7px",borderRadius:10,fontSize:9.5,fontWeight:700,fontFamily:F.u,flexShrink:0}}>{tag.t}</span>}
        <span style={{fontFamily:F.u,fontSize:12.5,fontWeight:600,color:C.tx}}>{title}</span>
      </div>
      <span style={{color:C.txM,fontSize:15,transform:o?"rotate(180deg)":"none",transition:"0.2s",flexShrink:0,marginLeft:8}}>▾</span>
    </div>
    {o&&<div style={{marginTop:11}} onClick={e=>e.stopPropagation()}>{children}</div>}
  </div>;
};
const Metric = ({label,value,unit,color}) => (
  <div style={{background:C.cardAlt,borderRadius:8,padding:"11px 13px",flex:"1 1 120px",minWidth:120,border:`1px solid ${C.border}`}}>
    <Label>{label}</Label>
    <div style={{fontFamily:F.d,fontSize:22,fontWeight:700,color:color||C.accent,marginTop:2}}>
      {value}<span style={{fontSize:11,fontWeight:400,color:C.txM,marginLeft:3}}>{unit}</span>
    </div>
  </div>
);
const RC = ({source,year,finding,impl,type}) => {
  const tc = type==="support"?C.green:type==="challenge"?C.red:C.yellow;
  const tt = type==="support"?"STØTTER":type==="challenge"?"UTFORDRER":"NYANSERER";
  return <div style={{background:C.cardAlt,borderRadius:9,padding:"13px 15px",marginBottom:8,borderLeft:`3px solid ${tc}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
      <span style={{fontFamily:F.u,fontSize:12,fontWeight:700,color:C.tx}}>{source} ({year})</span>
      <span style={{fontFamily:F.u,fontSize:9,fontWeight:700,color:tc,background:tc+"15",padding:"1px 7px",borderRadius:8}}>{tt}</span>
    </div>
    <P style={{fontSize:12.5,margin:"0 0 4px",color:C.txD}}><strong style={{color:C.tx}}>Funn:</strong> {finding}</P>
    <P style={{fontSize:12,margin:0,color:C.txM,fontStyle:"italic"}}>→ {impl}</P>
  </div>;
};
const ChannelBar = ({name,icon,pct,color,desc,active}) => (
  <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:9,opacity:active?1:0.45}}>
    <span style={{fontSize:15,width:20,textAlign:"center"}}>{icon}</span>
    <div style={{flex:1}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
        <span style={{fontFamily:F.u,fontSize:11.5,fontWeight:600,color:C.tx}}>{name}</span>
        <span style={{fontFamily:F.u,fontSize:10.5,fontWeight:700,color:color}}>{pct}%</span>
      </div>
      <div style={{height:5,background:C.border,borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3,transition:"width 0.4s"}}/>
      </div>
      <span style={{fontFamily:F.u,fontSize:10,color:C.txM}}>{desc}</span>
    </div>
  </div>
);

const FlowSVG = ({stage,score}) => {
  const act = stage!=="inactive";
  const full = stage==="full";
  const deact = stage==="deactivating";
  const post = stage==="post";
  const col = {inactive:C.border,auto:C.yellow,full:C.green,deactivating:C.yellowDim,post:C.greenL}[stage]||C.border;
  const cardFill = "#FFFFFF";
  const bgFill = C.cardAlt;

  return <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",margin:"0 -4px",padding:"0 4px"}}><svg viewBox="0 0 700 445" style={{width:"100%",minWidth:520,maxWidth:700,display:"block",margin:"0 auto"}}>
    <rect x={250} y={6} width={200} height={44} rx={10} fill={act?"#FEF9E7":cardFill} stroke={act?C.yellow:C.border} strokeWidth={act?2:1}/>
    <text x={350} y={23} textAnchor="middle" fill={C.tx} fontSize={11} fontWeight={600} fontFamily={F.u}>Eksternt energiprissjokk</text>
    <text x={350} y={38} textAnchor="middle" fill={act?C.yellow:C.txM} fontSize={9} fontFamily={F.u}>Sjokkindeks: {score}/100</text>

    <line x1={350} y1={50} x2={350} y2={70} stroke={col} strokeWidth={act?2:1} opacity={act?1:0.4}/>
    {act&&<polygon points="350,70 346,63 354,63" fill={col}/>}

    <rect x={120} y={72} width={460} height={48} rx={10} fill={bgFill} stroke={C.borderL} strokeWidth={1}/>
    <text x={160} y={90} fill={C.yellow} fontSize={9.5} fontWeight={700} fontFamily={F.u}>AUTOMATISK</text>
    <text x={160} y={103} fill={C.txM} fontSize={9} fontFamily={F.u}>Avgiftslette + prisbarometer</text>
    <text x={380} y={90} fill={full||deact||post?C.green:C.txM} fontSize={9.5} fontWeight={700} fontFamily={F.u}>FAGLIG BEKREFTET</text>
    <text x={380} y={103} fill={C.txM} fontSize={9} fontFamily={F.u}>{full?"Alle tiltak":deact?"Trapper ned":"Fagrådet vurderer"}</text>

    <line x1={350} y1={120} x2={350} y2={142} stroke={col} strokeWidth={act?2:1} opacity={act?1:0.4}/>
    {act&&<polygon points="350,142 346,136 354,136" fill={col}/>}

    <rect x={225} y={144} width={250} height={46} rx={10} fill={act||post?"#ECFDF5":cardFill} stroke={act||post?C.green:C.border} strokeWidth={act||post?2:1}/>
    <text x={350} y={162} textAnchor="middle" fill={C.tx} fontSize={11.5} fontWeight={700} fontFamily={F.u}>Sjokkfondet</text>
    <text x={350} y={177} textAnchor="middle" fill={act||post?C.green:C.txM} fontSize={9} fontFamily={F.u}>
      {post?"Deaktivert, grønn reinvestering aktiv":{full:"Alle tiltak aktivert",auto:"Avgiftslette aktivert",deactivating:"Trapper ned",inactive:"Inaktivt"}[stage]} {act?" | Tak: 0,5% BNP/kv":""}
    </text>

    <line x1={475} y1={167} x2={570} y2={167} stroke={C.blueL} strokeWidth={1} strokeDasharray="4 3" opacity={act?0.7:0.3}/>
    <rect x={570} y={155} width={100} height={24} rx={7} fill={cardFill} stroke={C.blueL} strokeWidth={1} opacity={act?1:0.4}/>
    <text x={620} y={170} textAnchor="middle" fill={C.blueL} fontSize={9} fontWeight={600} fontFamily={F.u} opacity={act?1:0.5}>Norges Bank</text>

    <line x1={225} y1={167} x2={130} y2={167} stroke={C.accent} strokeWidth={1} strokeDasharray="4 3" opacity={act?0.7:0.3}/>
    <rect x={20} y={155} width={110} height={24} rx={7} fill={act?C.accent+"10":cardFill} stroke={C.accent} strokeWidth={1} opacity={act?1:0.4}/>
    <text x={75} y={170} textAnchor="middle" fill={C.accent} fontSize={9} fontWeight={600} fontFamily={F.u} opacity={act?1:0.5}>Konkurransetilsyn</text>

    {[
      {x:110,l:"Avgiftslette (25 % av midlene)",c:C.ch1,on:act&&!post},
      {x:350,l:"Husholdningsstøtte (40 %)",c:C.ch2,on:full||deact},
      {x:590,l:"Næringshjelp (35 %)",c:C.ch3,on:full||deact},
    ].map((ch,i)=>{
      const op=ch.on?1:0.35;
      const fx=290+(i-1)*60, fy=190, tx=ch.x, ty=232;
      const dx=tx-fx, dy=ty-fy, len=Math.sqrt(dx*dx+dy*dy);
      const nx=dx/len, ny=dy/len, px=-ny, py=nx;
      return <g key={i}>
        <line x1={fx} y1={fy} x2={tx} y2={ty} stroke={ch.on?ch.c:C.border} strokeWidth={ch.on?1.5:1} opacity={op} strokeDasharray={ch.on?"none":"4 3"}/>
        {ch.on&&<polygon points={`${tx},${ty} ${tx-nx*9+px*4.5},${ty-ny*9+py*4.5} ${tx-nx*9-px*4.5},${ty-ny*9-py*4.5}`} fill={ch.c}/>}
        <rect x={ch.x-68} y={234} width={136} height={42} rx={8} fill={ch.on?cardFill:bgFill} stroke={ch.on?ch.c:C.border} strokeWidth={ch.on?1.5:1} opacity={op}/>
        <text x={ch.x} y={252} textAnchor="middle" fill={C.tx} fontSize={10} fontWeight={600} fontFamily={F.u} opacity={op}>{ch.l}</text>
        <text x={ch.x} y={265} textAnchor="middle" fill={C.txM} fontSize={9} fontFamily={F.u} opacity={op}>{ch.on?"● Aktiv":"○ Inaktiv"}</text>
      </g>;
    })}

    {deact&&<>
      <rect x={220} y={290} width={260} height={18} rx={6} fill={C.yellowDim+"12"} stroke={C.yellowDim+"33"} strokeWidth={1}/>
      <text x={350} y={303} textAnchor="middle" fill={C.yellowDim} fontSize={9} fontWeight={600} fontFamily={F.u}>↓ Gradvis nedtrapping — tiltak avsluttes sekvensielt</text>
    </>}

    {post&&<>
      <line x1={350} y1={276} x2={350} y2={302} stroke={C.greenL} strokeWidth={2}/>
      <polygon points="350,302 346,296 354,296" fill={C.greenL}/>
      <rect x={220} y={304} width={260} height={68} rx={10} fill={C.greenL+"08"} stroke={C.greenL} strokeWidth={1.5}/>
      <text x={350} y={322} textAnchor="middle" fill={C.greenL} fontSize={10.5} fontWeight={700} fontFamily={F.u}>Grønn reinvestering</text>
      <text x={350} y={336} textAnchor="middle" fill={C.txD} fontSize={9} fontFamily={F.u}>20% av brukte midler → fornybar/effektivisering</text>
      <text x={350} y={348} textAnchor="middle" fill={C.txM} fontSize={8.5} fontFamily={F.u}>24 mnd utbetaling | Tak 5 mrd/år | Fire virkemidler</text>
      <text x={350} y={362} textAnchor="middle" fill={C.accent} fontSize={8.5} fontWeight={600} fontFamily={F.u}>🔍 Prisbarometeret kjører 6 mnd etter deaktivering</text>
    </>}

    <rect x={240} y={390} width={220} height={18} rx={9} fill={(act||post)?col+"15":C.border+"22"}/>
    <text x={350} y={402} textAnchor="middle" fill={(act||post)?col:C.txM} fontSize={10} fontWeight={600} fontFamily={F.u}>
      {{inactive:"INAKTIV",auto:"AVGIFTSLETTE AKTIVERT",full:"ALLE TILTAK AKTIVERT",deactivating:"TRAPPER NED",post:"GRØNN REINVESTERING + PRISBAROMETER"}[stage]}
    </text>
  </svg></div>;
};


function PSFv4() {
  const [oil,setOil]=useState(55);
  const [vol,setVol]=useState(40);
  const [geo,setGeo]=useState(50);
  const [phase,setPhase]=useState("live");
  const [akkBruk,setAkkBruk]=useState(0);

  const score = Math.round(oil*0.4+vol*0.3+geo*0.3);
  const liveStage = score>=75?"full":score>=60?"auto":"inactive";
  const stage = phase==="deact"?"deactivating":phase==="post"?"post":liveStage;
  const stageCol = {inactive:C.txM,auto:C.yellow,full:C.green,deactivating:C.yellowDim,post:C.greenL}[stage];
  const stageLabel = {inactive:"Inaktivt",auto:"Avgiftslette aktivert",full:"Alle tiltak aktivert",deactivating:"Trapper ned",post:"Reinvestering + barometer"}[stage];
  const kvartalsramme = 20;
  const bruksFaktor = score>=75 ? 0.6+(score-75)*0.016 : score>=60 ? 0.2+(score-60)*0.027 : 0;
  const estimertBruk = Math.round(kvartalsramme * bruksFaktor * 10) / 10;
  const nedtrappBruk = phase==="deact" ? 8.6 : 0;
  const greenTotal = akkBruk > 0 ? Math.round(akkBruk * 0.2 * 10) / 10 : Math.round(estimertBruk * 0.2 * 10) / 10;
  const greenPerYear = Math.min(greenTotal, 5);
  const greenMonths = greenTotal > 0 ? Math.max(24, Math.ceil(greenTotal / 5) * 12) : 0;

  return <div style={{background:C.bg,minHeight:"100vh",padding:"24px 12px",fontFamily:F.u,overflowX:"hidden"}}>
    <div style={{maxWidth:720,margin:"0 auto"}}>

    {/* ===== HEADER ===== */}
    <div style={{textAlign:"center",marginBottom:24}}>
      <Label style={{color:C.accent}}>FrogLab - april 2026</Label>
      <h1 style={{fontFamily:F.d,fontSize:28,fontWeight:900,color:C.tx,margin:"7px 0 5px",lineHeight:1.2}}>Sjokkfondet</h1>
      <p style={{fontFamily:F.b,fontSize:15,color:C.txD,margin:0,maxWidth:540,marginLeft:"auto",marginRight:"auto"}}>
        Når energikriser fyller statskassen og tømmer lommebøkene, bør pengene gå tilbake til de som rammes — automatisk, målrettet og midlertidig. Et regelbasert alternativ til ad hoc-politikk.
      </p>
    </div>

    {/* ===== PROBLEMET ===== */}
    <Sec icon="⚠️" accent={C.red+"33"}>
      <P style={{fontSize:16,fontWeight:600,color:C.tx,lineHeight:1.65,margin:"0 0 14px"}}>
        I 2022 tjente staten over 1 000 milliarder på olje og gass. Samtidig fikk husholdningene 18 000 kr mindre å rutte med. Kommuner kuttet i tjenester. Fiskere vurderte å legge båten til kai. Det finnes ingen mekanisme som kobler det ene til det andre.
      </P>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:10,marginBottom:14}}>
        <div style={{background:C.red+"08",borderRadius:10,padding:"14px 16px",border:`1px solid ${C.red}22`}}>
          <P style={{fontSize:12,fontWeight:700,color:C.red,margin:"0 0 6px"}}>Uten Sjokkfondet</P>
          <P style={{fontSize:12,margin:"0 0 4px"}}>• Statens merinntekter går til oljefondet — ikke til de som rammes</P>
          <P style={{fontSize:12,margin:"0 0 4px"}}>• Ad hoc-tiltak tar måneder, ender i hestehandel</P>
          <P style={{fontSize:12,margin:"0 0 4px"}}>• Avgiftskutt absorberes av kjedene — når ikke forbrukeren</P>
          <P style={{fontSize:12,margin:0}}>• Renten heves uansett årsak — straffer gjeldsbyrde uten å fikse tilbud</P>
        </div>
        <div style={{background:C.green+"08",borderRadius:10,padding:"14px 16px",border:`1px solid ${C.green}22`}}>
          <P style={{fontSize:12,fontWeight:700,color:C.green,margin:"0 0 6px"}}>Med Sjokkfondet</P>
          <P style={{fontSize:12,margin:"0 0 4px"}}>• Merinntektene kobles automatisk til kompensasjon</P>
          <P style={{fontSize:12,margin:"0 0 4px"}}>• Aktiveres i dager, ikke måneder — regelbasert trigger</P>
          <P style={{fontSize:12,margin:"0 0 4px"}}>• Sjablong-tilskudd går direkte til aktøren — ingen mellomledd</P>
          <P style={{fontSize:12,margin:0}}>• Demper prisvekst — kan gi sentralbanken rom for mildere rente</P>
        </div>
      </div>
      <P style={{fontSize:14,fontWeight:600,color:C.accent,margin:0}}>
        Norge tjener på energikriser. De som rammes gjør det ikke. Sjokkfondet kobler det ene til det andre — automatisk, midlertidig og med innebygd disiplin.
      </P>
    </Sec>

    {/* ===== DEL I: MODELLEN ===== */}
    <div style={{borderTop:`2px solid ${C.accent}`,marginBottom:6,paddingTop:4,marginTop:8}}>
      <Label style={{color:C.accent,fontSize:11}}>Del I</Label>
      <h2 style={{fontFamily:F.d,fontSize:22,fontWeight:900,color:C.tx,margin:"4px 0 16px"}}>Modellen</h2>
    </div>

    <P style={{fontSize:14,color:C.txD,margin:"0 0 18px"}}>
      Sjokkfondet er regelbasert, forskningsforankret og bygget for å gjøre Norge mer robust. Det aktiveres kun ved eksterne sjokk, trapper ned automatisk, og bruker hvert sjokk til å redusere sårbarheten på de områdene vi selv kan kontrollere.
    </P>

    {/* Simulator */}
    <Sec title="Simuler hele livssyklusen" icon="⚙️">
      <P style={{fontSize:13,margin:"0 0 6px"}}>Sjokkindeksen måler ikke prisnivå, men hastige endringer og kontekst. En oljepris på $110 etter gradvis stigning over 18 måneder gir lav score. Et hopp fra $70 til $119 på én uke — kombinert med markedsuro og krig — gir en score som utløser fondet.</P>
      <P style={{fontSize:12,color:C.txM,margin:"0 0 14px"}}>Følg sjokkets livssyklus med knappene under, eller dra i gliderne selv.</P>

      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
        {[
          {l:"Sjokket kommer",p:"live",c:C.yellow,oil:50,vol:65,geo:80,akk:6.2},
          {l:"Sjokket er her",p:"live",c:C.red,oil:95,vol:85,geo:90,akk:23.3},
          {l:"Sjokket avtar",p:"deact",c:C.yellowDim,oil:30,vol:35,geo:40,akk:31.9},
          {l:"Etter krisen",p:"post",c:C.greenL,oil:15,vol:20,geo:15,akk:31.9},
        ].map(b=><button key={b.l} onClick={()=>{setPhase(b.p);setOil(b.oil);setVol(b.vol);setGeo(b.geo);setAkkBruk(b.akk);}} style={{
          flex:"1 1 auto",padding:"7px 12px",borderRadius:6,border:`1px solid ${phase===b.p&&oil===b.oil?b.c:C.border}`,
          background:phase===b.p&&oil===b.oil?b.c+"12":"transparent",
          color:phase===b.p&&oil===b.oil?b.c:C.txM,
          fontSize:10,fontWeight:600,fontFamily:F.u,cursor:"pointer"
        }}>{b.l}</button>)}
      </div>

      <div style={{background:C.cardAlt,borderRadius:12,padding:"20px 18px 10px",border:`1px solid ${C.border}`,marginBottom:14}}>
        <div style={{marginBottom:14}}>
          <span style={{fontFamily:F.u,fontSize:13,fontWeight:600,color:C.tx}}>Prøv selv:</span>
        </div>
        {[
          {l:"Prishopp",sub:"endring vs. 90-dagers snitt",w:"vekt 40 %",v:oil,s:setOil},
          {l:"Markedsuro",sub:"volatilitet siste 30 dager",w:"vekt 30 %",v:vol,s:setVol},
          {l:"Konfliktrisiko",sub:"geopolitisk risikoindeks",w:"vekt 30 %",v:geo,s:setGeo},
        ].map(x=><div key={x.l} style={{marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
            <div>
              <span style={{fontFamily:F.u,fontSize:13,fontWeight:700,color:C.tx}}>{x.l}</span>
              <span style={{fontFamily:F.u,fontSize:11,color:C.txM,marginLeft:6}}>{x.sub} ({x.w})</span>
            </div>
            <span style={{fontFamily:F.d,fontSize:20,fontWeight:700,color:C.accent}}>{x.v}</span>
          </div>
          <input type="range" min={0} max={100} value={x.v} onChange={e=>{x.s(parseInt(e.target.value));setPhase("live");setAkkBruk(0);}} style={{width:"100%",height:8}}/>
        </div>)}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        <Metric label="Sjokkindeks" value={score} unit="/100" color={stageCol}/>
        <Metric label="Status" value={stageLabel} unit="" color={stageCol}/>
      </div>
      {(stage!=="inactive")&&<div style={{background:stage==="post"?C.greenL+"08":C.cardAlt,borderRadius:9,padding:"12px 14px",marginBottom:14,border:`1px solid ${stage==="post"?C.greenL+"33":C.border}`}}>
        {stage==="post"?<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8}}>
            <div>
              <Label style={{color:C.greenL}}>Grønn reinvestering</Label>
              <P style={{fontSize:12,fontWeight:600,color:C.greenL,margin:"3px 0 0"}}>Pågår</P>
            </div>
            <div>
              <Label>Avsatt</Label>
              <P style={{fontSize:12,fontWeight:600,color:C.greenL,margin:"3px 0 0"}}>{greenTotal} mrd kr</P>
              <P style={{fontSize:10,color:C.txM,margin:0}}>20 % av {akkBruk} mrd totalt brukt</P>
            </div>
            <div>
              <Label>Tak</Label>
              <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"3px 0 0"}}>{greenPerYear} mrd kr/år</P>
              <P style={{fontSize:10,color:C.txM,margin:0}}>{greenTotal>5?`Absorpsjonstak, over ${greenMonths} mnd`:"Over 24 mnd"}</P>
            </div>
            <div>
              <Label>Virkemidler</Label>
              <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"3px 0 0"}}>Bedre og raskere</P>
              <P style={{fontSize:10,color:C.txM,margin:0}}>Energitiltak i bygg</P>
            </div>
          </div>
          <div style={{marginTop:10,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
            <P style={{fontSize:10.5,color:C.txM,margin:0}}>Stabilisering avsluttet. Ble brukt totalt i sjokket: {akkBruk} mrd kr. Restmidler tilbakeføres til SPU.</P>
          </div>
        </>:<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:8}}>
            <div>
              <Label>Finansiering</Label>
              <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"3px 0 0"}}>Petroleums-merinntekter</P>
            </div>
            <div>
              <Label>Ramme (tak)</Label>
              <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"3px 0 0"}}>{kvartalsramme} mrd kr/kv</P>
              <P style={{fontSize:10,color:C.txM,margin:0}}>0,5 % fastlands-BNP</P>
            </div>
            <div>
              <Label>Brukt denne perioden</Label>
              <P style={{fontSize:12,fontWeight:600,color:stageCol,margin:"3px 0 0"}}>
                {stage==="deactivating"?`${nedtrappBruk} mrd kr`:`${estimertBruk} mrd kr`}
              </P>
              <P style={{fontSize:10,color:C.txM,margin:0}}>
                {stage==="deactivating"?"Trapper ned over 3 mnd":`${Math.round(bruksFaktor*100)} % av ramme`}
              </P>
            </div>
            <div>
              <Label>Totalt brukt</Label>
              <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"3px 0 0"}}>{akkBruk||estimertBruk} mrd kr</P>
              <P style={{fontSize:10,color:C.txM,margin:0}}>Akkumulert over hele sjokket</P>
            </div>
          </div>
        </>}
      </div>}
      <FlowSVG stage={stage} score={score}/>
    </Sec>

    {/* Channels */}
    <Sec title="Slik brukes pengene" icon="🔀">
      <P style={{fontSize:13,margin:"0 0 14px"}}>Trykk for å se hvordan hvert tiltak fungerer i praksis.</P>
      <Acc title="⚡ Avgiftslette — 25 % av midlene" tag={{t:"AUTOMATISK",c:C.purple}}>
        <ChannelBar name="Avgiftslette" icon="⚡" pct={25} color={C.ch1} active={true} desc="Kutt i statlige avgifter som driver energi- og transportkostnader."/>
        <div style={{background:C.cardAlt,borderRadius:7,padding:"10px 12px",marginTop:8}}>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"0 0 5px"}}>Hva kuttes?</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Elavgift, nettleie, veibruksavgift på bensin/diesel, CO₂-avgift på drivstoff. Rettet mot inputkostnader — ikke subsidiert sluttforbrukerpris. Gjelder alle strømforbrukere, inkludert kommunale bygg som skoler, sykehjem og idrettshaller.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"6px 0 5px"}}>Kommunal strømprisskjerming</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Kommuner mottar ikke strømprisskjerming i dag. Ved aktivert sjokkfond utvides ordningen til kommunale bygg (skoler, sykehjem, idrettshaller) med eget kvartalstak. Adresserer det eneste hullet i strømdekningen. Kommuner er lovpålagt å levere tjenester — de kan ikke kutte strømforbruk uten å ramme innbyggerne.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"6px 0 5px"}}>Hvordan?</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Gjennom eksisterende avgiftssystem (Skatteetaten, Tolletaten). Kan tre i kraft innen dager — Stortinget vedtok et lignende kutt 26. mars uten komitébehandling.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"6px 0 5px"}}>Presedens</P>
          <P style={{fontSize:11.5,margin:0}}>Strømstøtten 2021–23, Norgespris fra 2025, veibruksavgiftkutt mars 2026. Infrastrukturen finnes. Det eneste nye er at det skjer automatisk.</P>
        </div>
      </Acc>
      <Acc title="🏠 Husholdningsstøtte — 40 % av midlene" tag={{t:"FAGLIG BEKREFTET",c:C.yellow}}>
        <ChannelBar name="Husholdningsstøtte" icon="🏠" pct={40} color={C.ch2} active={true} desc="Behovsprøvd støtte til de som rammes hardest."/>
        <div style={{background:C.cardAlt,borderRadius:7,padding:"10px 12px",marginTop:8}}>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"0 0 5px"}}>Hvem kvalifiserer?</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Husholdninger under medianinntekt og/eller med gjeldsgrad over 200 %. Kriteriene finnes allerede i bostøtte og strømstøtte.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"6px 0 5px"}}>Hvor mye?</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Kalibrert etter IMF (Arregui et al. 2022): Full kompensasjon av de 20 % med lavest inntekt koster 0,4 % av BNP. Kvartalstak 0,5 % fastlands-BNP begrenser total utbetaling.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"6px 0 5px"}}>Hvordan?</P>
          <P style={{fontSize:11.5,margin:0}}>Via Skatteetaten (som har inntekts- og gjeldsdata) eller NAV (som forvalter bostøtte). Konkret utbetalingskanal må utredes.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Levekostnadstilskudd med to-trinns kalibrering</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Husholdningsstøtten kalibreres i to trinn for å fange opp at energiprissjokk slår gjennom i matpriser med 6-12 måneders forsinkelse.</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>Trinn 1 (ved aktivering):</strong> Kalibrert etter direkte energikostnader (strøm, drivstoff). Utbetales umiddelbart.</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>Trinn 2 (forsinket):</strong> Hvis konsumprisindeksen for matvarer overstiger 5 % over 12 måneder etter aktivering, oppjusteres støtten med en matpriskomponent. Fagrådet kan også anbefale trinn 2 før terskelen nås. Trinn 2 treffer typisk 2-4 kvartaler etter aktivering — konsistent med dokumentert tidslag.</P>
          <P style={{fontSize:11.5,margin:0,color:C.txM,fontStyle:"italic"}}>Inspirert av Canadas Grocery Rebate (2023): automatisk identifisering via skattesystemet, målrettet lavinntekt, ingen søknad, frie penger. Canada har gjort dette permanent fra 2026. Men Canadas modell mangler det Sjokkfondet har: automatisk trigger. IMF: «Targeted cash transfers are the most cost-effective way of alleviating the burden.»</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Automatisk inflasjonssupplement for trygdede</P>
          <P style={{fontSize:11.5,margin:0}}>Ved aktivert sjokkfond: automatisk engangstilskudd til pensjonister/trygdede som forskudd på neste trygdeoppgjør. 1,5 mill berørt. Motregnes i neste oppgjør. Treffer den mest sårbare gruppen for importert matprisstigning. Adresserer 12 mnd forsinkelse i trygdeoppgjøret — gapet mellom sjokk og kompensasjon er reelt.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Transporttilskudd for lavinntekt</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Skatteetaten identifiserer lavinntektshusholdninger automatisk. Fast kvartalsbeløp direkte til konto ved aktivert sjokkfond. Hva mottakeren bruker det på — diesel, bensin, lading, bussbillett, sykkel — er deres valg. Transportnøytralt: bil, elbil, kollektiv og sykkel likestilt. Ingen registrering, ingen ny infrastruktur.</P>
          <P style={{fontSize:11.5,margin:0,color:C.txM,fontStyle:"italic"}}>De som har strukket seg for elbil straffes ikke. De som ikke har bil ekskluderes ikke. Alle i lavinntekt er eksponert for transportkostnader — enten direkte (drivstoff/lading) eller indirekte (dyrere bussbilletter, økte fraktkostnader). Inspirert av Hellas' Fuel Pass (april 2026), men bedre: forhåndsidentifisert, transportnøytralt, inkluderer alle.</P>
        </div>
      </Acc>
      <Acc title="🏭 Næringshjelp — 35 % av midlene" tag={{t:"FAGLIG BEKREFTET",c:C.yellow}}>
        <ChannelBar name="Næringshjelp" icon="🏭" pct={35} color={C.ch3} active={true} desc="Demper bedriftenes kostnadssjokk direkte."/>
        <div style={{background:C.cardAlt,borderRadius:7,padding:"10px 12px",marginTop:8}}>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"0 0 5px"}}>Tre delmekanismer</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>1. Redusert arbeidsgiveravgift — via Skatteetaten, virker umiddelbart, brukt under COVID.</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>2. Energikostnadskompensasjon for bedrifter over en terskel — ligner CO₂-kompensasjonsordningen.</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>3. Kommuner inkluderes automatisk: de er arbeidsgivere som får redusert arbeidsgiveravgift, og strømforbrukere som får avgiftslette. Kommuner mottar ikke strømstøtte i dag, så Sjokkfondets tiltak er den eneste direkte skjermingen de får ved energiprissjokk.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Sjablong-prisbrems for off-road diesel og marin gasolje</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Forhåndsberegnet sjablongtilskudd per fartøy-/maskintype. Tilskudd = (markedspris − referansepris) × 25 % av årlig normalforbruk. Utbetales som blokk, ikke per liter — bevarer insentiv til å spare. Fiskeri via Garantikassen, landbruk via Landbruksdirektoratet. Ingen ny etat. Sjablongtabellen publiseres i forskriften — aktører vet nøyaktig hva de får. 20 % øremerkes grønn reinvestering (el-traktorer, hybridløsninger kystflåte).</P>
          <P style={{fontSize:11.5,margin:"0 0 4px",color:C.txM,fontStyle:"italic"}}>Fiskeri og landbruk er blant de hardest rammede i den pågående krisen — og har ingen Sjokkfond-dekning i dag. I april 2026 improviserte Spania (20c/l til transport/bønder/fiskere) og Italia (skattefradrag for transportører/fiskeri) lignende ordninger under tidspress.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Bedrifts-prisbrems for elektrisitet</P>
          <P style={{fontSize:11.5,margin:"0 0 4px"}}>Tysk «Strompreisbremse»-modell: alle bedrifter får 80 % av historisk forbruk til referansepris, resten til markedspris. Selvmålrettende — bedrifter med høyt strømforbruk relativt til omsetning (bakere, veksthus, små produsenter) får mye, kontorbedrifter lite. Utbetales via Elhub-data (allerede digitalisert). Automatisk trigger ved elektrisitetsindeks >60.</P>
          <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"6px 0 5px"}}>Hvorfor bedrift først?</P>
          <P style={{fontSize:11.5,margin:0}}>Glocker & Wegmüller (2024): Bedriftssubsidier er mer effektive enn forbrukerskattekutt. De demper kostnadspress uten å øke etterspørselen.</P>
        </div>
      </Acc>
      <Acc title="🏠 Husleietak" tag={{t:"UNDER AKTIVERING",c:C.txM}}><div style={{background:C.cardAlt,borderRadius:7,padding:"10px 12px"}}>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Maks 2 % årlig husleiejustering så lenge Sjokkfondet er aktivt. Spania innførte nøyaktig dette i 2022. Oppheves automatisk ved deaktivering.</P>
      </div></Acc>
      <Acc title="🏦 Koordinering med Norges Bank — formelt aktiveringsvarsel" tag={{t:"UNDER AKTIVERING",c:C.txM}}><div style={{background:C.cardAlt,borderRadius:7,padding:"10px 12px"}}>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Ved aktivering sender Finansdepartementet formelt brev til Norges Bank med: (a) aktiverte tiltak og varighetsestimat, (b) SSB/fagrådets beregning av forventet inflasjonsdemping (i prosentpoeng KPI), (c) estimert budsjettvirkning. Analogt til avviksforklaring ved avvik fra handlingsregelen.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Norges Bank er ikke bundet, men har formelt grunnlag for å justere inflasjonsprognose. Forankres i Sjokkfondets forskrift som prosedyrekrav — ikke pengepolitisk styring.</P>
        <P style={{fontSize:11.5,margin:0,color:C.txM,fontStyle:"italic"}}>Uten formelt signal risikerer vi at R-effekten — Sjokkfondets viktigste makroøkonomiske tilleggseffekt — går tapt. I april 2026 advarte Stoltenberg om at avgiftskuttet kunne presse renten opp, mens Vedum hevdet det dempet prisvekst. Sjokkfondets aktiveringsvarsel ville gitt Norges Bank kvantifisert grunnlag i stedet for politisk tautrekking.</P>
      </div></Acc>
      <Acc title="🔍 Prisbarometeret — dagligvare og drivstoff" tag={{t:"UNDER AKTIVERING",c:C.txM}}><div style={{background:C.cardAlt,borderRadius:7,padding:"10px 12px"}}>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>To sektormoduler, felles mekanisme. Gjør forskjellen mellom kostnadsøkning og prisøkning synlig — per kjede, med navn. Ikke prisregulering — transparens som bevarer markedsmekanismen.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Dagligvare-modul</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>NorgesGruppen, Coop og Rema rapporterer ukentlig innkjøps- og utsalgspriser for 30 basisvarer til Konkurransetilsynet. Aggregert bruttomargin per kjede publiseres månedlig. Baseline: gjennomsnittlig margin for 12 måneder forut for aktivering. Forskjellen mellom dokumentert kostnadsøkning og faktisk prisøkning — per kjede — er det som publiseres.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px",color:C.txM,fontStyle:"italic"}}>Designet gjennom seks-etappers analyse med akademisk triangulering, stakeholder-analyse, og internasjonal komparativ. Forskning viser at basisvarer har høyere prisgjennomslag enn andre varer (Herrera et al. 2019) — mel, melk og egg rammes hardest. Og: transparens mellom konkurrenter kan forsterke koordinering (norsk 4,9 mrd-bot 2024). Derfor: informasjonen flyter fra kjedene → til Konkurransetilsynet → til offentligheten. Aldri mellom kjedene.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Drivstoff-modul</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Ingen ny rapportering nødvendig — bruttomargin per kjede beregnes fra offentlige data: pumpepris minus avgifter minus innkjøpspris (Platts/Argus-referanse). Publiseres ukentlig under aktivering.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Gjennomslags-test</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Ny mekanisme uten forløper i noe OECD-land. Når Stortinget endrer drivstoffavgifter under aktivert sjokkfond, publiseres forventet vs. faktisk prisendring per kjede — etter 1, 3 og 7 dager. Gjør det umulig å absorbere avgiftskutt uten at det synes. Virker begge veier: avslører absorpsjon ved kutt og over-velting ved økning.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px",color:C.txM,fontStyle:"italic"}}>1. april 2026: Stortinget kuttet veibruksavgiften med 3,3 mrd kr. Regjeringen skrev «gitt at hele avgiftsreduksjonen veltes over i prisene» — ordvalget erkjenner at gjennomslag ikke er garantert. Med gjennomslags-testen ville absorpsjonen vært kvantifisert per kjede innen 48 timer.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Sunset</P>
        <P style={{fontSize:11.5,margin:0}}>Begge moduler opphører 6 måneder etter deaktivering — dekker «rockets and feathers»-fasen der priser forblir høye etter at kostnader har falt (Bakhat et al. 2021). Inspirert av Østerrike (Spritpreisrechner — marginer falt), Tyskland (MTS-K — marginer falt), Canada (Food Price Data Hub) og Australia (ACCC Supermarkets Inquiry — ukentlig prisrapportering anbefalt 2025).</P>
      </div></Acc>
      <Acc title="♻️ Grønn reinvestering" tag={{t:"ETTER DEAKTIVERING",c:C.greenL}}><div style={{background:C.cardAlt,borderRadius:7,padding:"10px 12px"}}>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Etter deaktivering: 20 % av det Sjokkfondet faktisk brukte øremerkes grønn reinvestering. Utbetales over minimum 24 mnd. Absorpsjonstak 5 mrd/år.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Hva pengene skal brukes til</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>IEA (2022, 2025): Energieffektivisering i bygg er det høyest rangerte tiltaket — 9–30 arbeidsplasser per million dollar investert. KfW-programmet (Tyskland) viser at 1 euro i offentlig planlegging utløser 10–20 euro i privat investering. Etter kriser er modulære, skalerbare tiltak mest effektive; store infrastrukturprosjekter gir skuffende resultater.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Prioriterte tiltak: Energieffektivisering i bygg (isolasjon, varmepumper, ventilasjon, LED), solceller på eksisterende bygg, ladeinfrastruktur og nettforsterkning.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Hvem prioriteres</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Kapitalfattige aktører med høyest marginaleffekt: kommunale bygg (skoler, sykehjem, idrettshaller — mottar ikke strømstøtte), lavinntektshusholdninger, og SMB-er med høyt energiforbruk. I Danmark bruker nær en tredjedel av kommunene ESCO-modellen for energieffektivisering av offentlige bygg med dokumentert 30 % energisparing.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Hvem forvalter</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>Kanaliseres gjennom eksisterende statlige aktører med etablert kompetanse. Tre kandidater: Husbanken (allerede operativ for kommunale bygg, tilskuddsbasert, 110 kommuner har fått støtte), Enova (størst kapasitet, bredest mandat, ca. 30 mrd i oppsparte midler) og Kommunalbanken (kan tilby subsidierte lån etter KfW-modell). Valg av forvalter er en implementeringsdetalj — modellen spesifiserer formål, mottakere og rammer, ikke etat.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Hvordan — fire virkemidler inspirert av internasjonal erfaring</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}>80 % av fondets midler gis tilbake til folk og bedrifter under krisen. 20 % investeres etterpå i å gjøre neste krise billigere. Administreres gjennom eksisterende søknadssystemer for å holde byråkratikostnaden lav.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>Progressiv lånemodell (KfW, Tyskland):</strong> Sjokkfondets reinvesteringsmidler finansierer en rentesubsidie for energilån. Husholdninger og bedrifter søker hos sin vanlige bank. Kommuner via Kommunalbanken. Staten dekker rentedifferansen. Jo mer ambisiøst tiltak, jo høyere rabatt. Ingen ny institusjon, bare en ny ordning gjennom eksisterende banker. Dokumentert 10–20x mobilisering av privat kapital per offentlig krone.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>One-stop-shop:</strong> Én dør inn for huseiere, kommuner og bedrifter — rådgivning, søknad, finansiering og kobling til håndverkere samlet. EU-direktivkrav fra 2026. Norge har sparenergi.no (informasjon), men ingen operativ one-stop-shop.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>Hurtigspor for standardtiltak:</strong> Forenklede byggesøknader for varmepumper, solceller og isolasjon — tiltak som er veldokumenterte og ikke krever individuell vurdering. Nederland krever myndighetssvar innen 8 uker med bøter ved oversittelse. Danmark har samlet hele tillatelsesprosessen i én lov.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>ESCO for kommunale bygg (Danmark, Belgia):</strong> Kommunen betaler ingenting opp front. ESCO-selskapet garanterer energibesparelsen kontraktsfestet, og investeringen betales tilbake gjennom dokumenterte besparelser. Sjokkfondets midler kan brukes som risikoreduksjon for ESCO-kontrakter. Dokumentert 30 % energisparing i belgiske kommuner.</P>
        <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"8px 0 5px"}}>Hvorfor etterpå — ikke samtidig?</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>Etterspørselskonflikt:</strong> Under et prissjokk er økonomien allerede presset på kapasitetssiden. Grønne investeringer er etterspørsel — bygg, materialer, arbeidskraft. Å investere under krisen motvirker fondets eget formål.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>Motsyklisk timing:</strong> Etter sjokket faller typisk boliginvesteringene og byggebransjen får ledig kapasitet. Da er grønne investeringer billigere og gir mer fornybar per krone.</P>
        <P style={{fontSize:11.5,margin:"0 0 4px"}}><strong style={{color:C.tx}}>Politisk disiplin:</strong> Hvis fondet kan brukes til stabilisering og investering samtidig, skaper det press for å holde fondet aktivt lenger enn nødvendig. Ren separasjon hindrer formålsglidning.</P>
        <P style={{fontSize:11.5,margin:0}}><strong style={{color:C.tx}}>Selvkorrigerende:</strong> Ved å knytte grønn reinvestering til faktisk brukte midler, genererer større sjokk automatisk større grønne investeringer. Denne logikken fungerer bare rent hvis stabilisering og investering er sekvensielle — aldri samtidige.</P>
      </div></Acc>

    {/* ===== CASE: AKKURAT NÅ ===== */}
    <Sec icon="📌" accent={C.red+"33"}>
      <P style={{fontSize:14,fontWeight:700,color:C.red,margin:"0 0 8px"}}>Akkurat nå: April 2026</P>
      <P style={{fontSize:12.5,margin:"0 0 6px"}}>Iran-krigen stenger Hormuzstredet. Oljeprisen hopper fra 70 til 119 dollar på én uke. Gass doblet. Drivstoffpriser over 30 kr/liter. Transport, mat og energikostnader stiger i hele verdikjeden.</P>
      <P style={{fontSize:12.5,margin:"0 0 6px"}}>Norges Banks svar: Mulig renteheving allerede 7. mai — den første siden desember 2023. Markedet priser inn over 60 % sannsynlighet. Hver heving på 0,25 pp gir ca. 200 kr/mnd ekstra per million i boliglån.</P>
      <P style={{fontSize:12.5,margin:"0 0 6px"}}>Stortingets svar: Høyre fremmet hasteforslag om å fjerne veibruksavgiften. Senterpartiet brøt budsjettavtalen og stemte med høyresiden. Vedtaket kostet 6,7 milliarder — uten inndekning, uten behovsprøving, uten automatisk avslutning. Ap/Stoltenberg advarte mot inflasjon. SV vil ha kontantutbetalinger. MDG vil dele ut CO₂-avgiften. Frp vil kutte enda mer.</P>
      <P style={{fontSize:12.5,margin:"0 0 6px"}}>Hva som skjedde: Avgiftskuttet trådte i kraft 1. april. Bensinstasjonene økte prisene rett før. NAF/Drivstoffappen viser bensin ned bare 0,53 kr (forventet 4,41 kr), diesel faktisk opp 1,34 kr. Avgiftsletten ble absorbert av kjedene.</P>
      <P style={{fontSize:12.5,margin:"0 0 6px"}}>Nordeas sjeføkonom påpeker: «Det er først og fremst tjenesteprisene som har vært for høye. Hvis man nå får et råvaresjokk som presser opp vareprisene også, kan det bli en utfordring for Norges Bank.» Renten er designet for det første problemet — ikke det andre.</P>
      <P style={{fontSize:12.5,fontWeight:600,color:C.accent,margin:"0 0 10px"}}>Alle har rett i noe. Ingen har et system. Husholdningene får tredobbelt smell — dyrere drivstoff, dyrere mat, høyere rente — mens statskassen fylles raskere enn noensinne. Sjokkfondet ville erstattet dette kaoset med en regelbasert respons.</P>
      <P style={{fontSize:12,fontWeight:600,color:C.tx,margin:"0 0 6px"}}>14 land, 14 improviserte tiltak</P>
      <P style={{fontSize:11.5,margin:"0 0 4px"}}>Hele Europa improviserer: Spania €5 mrd pakke (mva-kutt, sektorsubsidier, husleiefrys). Ungarn pristak kun for ungarske skilter. Polen daglig pristak + mva 23→8 %. Italia 25 cent/l avgiftskutt i 20 dager. Irland avgiftskutt 15-20 cent/l. Tyskland maks én prisøkning per dag. Frankrike TotalEnergies frøs priser frivillig. Hellas margintak + Fuel Pass. Kroatia/Serbia pristak/eksportforbud. UK £53 mill til sårbare.</P>
      <P style={{fontSize:11.5,fontWeight:600,color:C.accent,margin:0}}>Tre gjennomgående problemer: avgiftskutt som ikke når forbrukeren (gjennomslags-problemet), kostnadsusikkerhet (Italias 20-dagers kutt kostet €527 mill — forlengelse ville koste €1,5 mrd), og ingen automatisk trigger — alle tiltak krever politisk beslutning under krise. Alt dette kunne vært automatisk.</P>
    </Sec>

    <Sec>
      <Acc title="Avgiftskutt gir etterspørselslekkasje" tag={{t:"STERK",c:C.red}}>
        <P style={{color:C.red,fontSize:12.5,fontStyle:"italic"}}>Erceg et al. (2024): Forbrukersubsidier kan virke mot sin hensikt.</P>
        <P style={{color:C.green,fontSize:12.5}}>Avgiftslette er 25 % av fondets midler, rettet mot inputkostnader. 75 % av midlene går til behovsprøvd støtte og bedriftssubsidier med betydelig lavere etterspørselslekkasje. NB-koordinering justerer rentebane.</P>
      </Acc>
      <Acc title="Forventningskanalen: Aktørene slutter å tilpasse seg" tag={{t:"STERK",c:C.red}}>
        <P style={{color:C.red,fontSize:12.5,fontStyle:"italic"}}>Hvis staten alltid kompenserer, endres lønnskrav, prissetting og spareatferd.</P>
        <P style={{color:C.green,fontSize:12.5}}>Sjokk-triggeren sikrer aktivering kun der husholdningene ikke er årsak. Midlertidighet + automatisk deaktivering + 3 mnd nedtrapping begrenser forventningseffekt.</P>
      </Acc>
      <Acc title="Pro-syklisk fristelse — fondet blir for generøst" tag={{t:"STERK — NORGESSPESIFIKK",c:C.red}}>
        <P style={{color:C.red,fontSize:12.5,fontStyle:"italic"}}>Frankel (NBER): Enorme merinntekter skaper uimotståelig press for å bruke mer.</P>
        <P style={{color:C.green,fontSize:12.5}}>Kvartalstak 0,5 % av fastlands-BNP, lovfestet. Automatisk deaktivering. Terskelverdier i lov, ikke forskrift. Og: grønn reinvestering gjør at jo mer Sjokkfondet bruker, jo mer investeres i å redusere fossil sårbarhet.</P>
      </Acc>
      <Acc title="Fossil lock-in: Fondet legitimerer fortsatt oljeproduksjon" tag={{t:"MODERAT",c:C.yellow}}>
        <P style={{color:C.red,fontSize:12.5,fontStyle:"italic"}}>IISD: Hvis regjeringer stoler på fossil windfall, støtter det fortsatt utvinning.</P>
        <P style={{color:C.green,fontSize:12.5}}>Adressert gjennom grønn reinvestering: Hvert sjokk genererer automatisk investeringer i fornybar kapasitet. Mekanismen gjør fossilkostnaden synlig og gjør Norge mer robust på de områdene vi selv kan kontrollere — eget energiforbruk og egen fornybar kapasitet.</P>
      </Acc>
      <Acc title="Prisbarometeret hemmer bedrifters kostnadsovervelting" tag={{t:"MODERAT",c:C.yellow}}>
        <P style={{color:C.red,fontSize:12.5,fontStyle:"italic"}}>Bedrifter har legitime grunner til å øke priser ved kostnadssjokk. Og forskning viser at pristransparens har svak effekt i konsentrerte markeder (Zhang et al. 2020).</P>
        <P style={{color:C.green,fontSize:12.5}}>Mekanismen er transparens, ikke prisregulering. Bedrifter som øker priser i takt med kostnader har ingenting å frykte — Prisbarometeret publiserer *gapet* mellom kostnadsøkning og prisøkning, ikke prisnivået. Og: krise-aktivert transparens kan virke der permanent ikke gjør det — fordi kostnadsgrunnlaget er offentlig under sjokk (NordPool, Brent). Avgiftskuttet 1. april 2026 viste behovet: kuttet nådde knapt forbrukerne. Gjennomslags-testen ville kvantifisert absorpsjonen per kjede innen 48 timer.</P>
      </Acc>
      <Acc title="Grønn reinvestering etter deaktivering kan drive inflasjon" tag={{t:"BEGRENSET",c:C.txM}}>
        <P style={{color:C.red,fontSize:12.5,fontStyle:"italic"}}>Investeringer i fornybar er etterspørsel — kan de drive prispress?</P>
        <P style={{color:C.green,fontSize:12.5}}>Timingen er motsyklisk: Etter energiprissjokk er det typisk ledig kapasitet i bygg/anlegg. Absorpsjonstak 5 mrd/år begrenser risiko. Disiplinregelen sikrer at investering aldri skjer under aktiv stabilisering.</P>
      </Acc>
      <Acc title="Forskningsgrunnlaget er tynt for Norge spesifikt" tag={{t:"ERKJENT",c:C.txM}}>
        <P style={{color:C.red,fontSize:12.5,fontStyle:"italic"}}>Nesten all forskning gjelder energi-importører.</P>
        <P style={{color:C.green,fontSize:12.5}}>Erkjent. Modellen er en syntese, ikke en replikering. Hver designbeslutning kan spores til en spesifikk forskningsreferanse — men kombinasjonen er ny.</P>
      </Acc>

    <Sec title="Forskningsgrunnlag" icon="📚">
      <P style={{fontSize:13,margin:"0 0 12px"}}>Fem forskningsspørsmål, systematisk gjennomgått. Hver studie vurdert som støttende, utfordrende eller nyanserende.</P>
      <Acc title="🔬 Virker det å bruke finanspolitikk mot prissjokk?">
        <RC source="IMF / Dao et al." year="2023" type="support" finding="Europeiske tiltak under energikrisen 2022 reduserte inflasjonen med gjennomsnittlig 0,9 prosentpoeng." impl="Direkte empirisk bevis for at mekanismene i avgiftslette og husholdningsstøtte virker."/>
        <RC source="CETEx Policy Report" year="2025" type="support" finding="Ukonvensjonell finanspolitikk var effektiv i Frankrike, Tyskland og Spania. Hastighet bør prioriteres over presisjon." impl="Støtter automatisk avgiftslette som førsterespons."/>
        <RC source="Erceg et al. (IMF)" year="2024" type="challenge" finding="Forbrukersubsidier kan være kontraproduktive — men mer rom i små økonomier uten påvirkning på globale priser." impl="Grunnen til at Avgiftslette er 25 % av fondets midler, rettet mot inputkostnader."/>
        <RC source="Glocker & Wegmüller" year="2024" type="support" finding="Bedriftssubsidier er mer effektive enn forbrukerskattekutt." impl="Direkte grunnlag for næringshjelp på 35 % av midlene."/>
      </Acc>
      <Acc title="🎯 Hva fungerer best — og for hvem?">

═══ GRØNN REINVESTERING: ALTERNATIVE FORVALTERMODELLER ═══

1. NORGES BANK SOM GRØNN REFINANSIERINGSKANAL (Vei 2)
   Inspirasjon: ECBs TLTRO, Bank of Japan, People's Bank of China, Bank of Malaysia.
   Mekanisme: Norges Bank tilbyr billigere F-lån til banker som dokumenterer økt
   utlån til energieffektivisering. Grønn TLTRO.
   Fordel: Mest effektivt, bruker eksisterende sentralbankinfrastruktur.
   Hindring: Krever endring i NB-mandatet (prisstabilitet). Politisk krevende.
   Lagarde (ECB, 2024): "Japan gjør det. Kina gjør det. Hvorfor ikke vi?"
   Forskning: Colesanti Senni, Pagliari & van 't Klooster (2023) viser at
   grønn TLTRO kan styre utlån mot lavutslippsaktiviteter.
   Status: Diskuteres aktivt i ECB. Ikke foreslått i Norge.

2. HUSBANKEN SOM MINI-KfW FOR BOLIGER (Vei 3)
   Mekanisme: Husbanken refinansierer energilån i vanlige banker, tilsvarende
   KfWs on-lending-modell. Husbanken låner billig (statsgaranti), videreformidler
   til DNB/SpareBank1 etc. som gir subsidierte energilån til husholdninger.
   Fordel: Husbanken har allerede kompetanse, 110 kommuner bruker dem.
   Hindring: Krever nytt mandat. Husbanken gir i dag tilskudd, ikke refinansiering.
   Fungerer kun for boliger, ikke næringsliv.

3. KOMMUNALBANKEN FOR KOMMUNALE BYGG
   Status: Allerede mulig. Kommunalbanken har AAA-rating, låner til kommuner.
   Sjokkfondets midler kan brukes som rentesubsidie på energilån.
   Kommuner er allerede kunder. Ingen ny relasjon nødvendig.

═══ GRØNN REINVESTERING: VIRKEMIDLER FRA INTERNASJONAL ERFARING ═══

4. ESCO FOR KOMMUNALE BYGG (Danmark, Belgia)
   Mekanisme: Energy Service Company garanterer energibesparelse kontraktsfestet.
   Kommunen betaler null opp front. Investering betales tilbake gjennom
   dokumenterte besparelser over kontraktsperioden.
   Erfaring: Nær 1/3 av danske kommuner bruker ESCO-modellen.
   Belgia (Limburg): 20M EUR prosjekt, minimum 30% energisparing per bygg.
   Sjokkfondet-kobling: Reinvesteringsmidler som risikoreduksjon for ESCO-kontrakter
   (dekker gapet mellom markedsrente og ESCO-finansieringskostnad).
   Kilde: IEA Tracking Energy Efficiency Investment Progress.

5. ONE-STOP-SHOP
   EU-direktivkrav fra 2026 (EPBD). Én dør inn for huseiere, kommuner og bedrifter.
   Rådgivning, søknad, finansiering og kobling til håndverkere samlet.
   Norge har sparenergi.no (NVE/Enova) = informasjon, ikke operativ one-stop-shop.
   Kommisjonen publiserte mars 2026 praktisk veiledning for etablering.
   Kilde: EU Commission recommendation on one-stop-shops (March 2026).

6. ENERGIESPRONG (Nederland → EU)
   Industrialiserte, prefabrikkerte fasadeelementer og takmoduler.
   3D-skanning av bygget → fabrikklaget løsning → montert på dager, ikke måneder.
   Energy Poverty Zero: 1150 netto-null-renoveringer, 15% kostnadsreduksjon.
   Spesielt relevant for norske kommunale boligblokker.

7. FRANKRIKES UTLEIEFORBUD FOR ENERGISLUK
   Klima- og resiliensloven: G-klassede boliger utestengt fra leiemarked 2025,
   F-klasse 2028, E-klasse 2034. Ineffektive bygg = juridisk foreldet.
   Sterkt signal til eiere og investorer. Norge har ingenting tilsvarende.

8. PROGRESSIV TILBAKEBETALINGSRABATT (KfW-detalj)
   KfW har 6 nivåer: Efficiency House 55, 70, 85, 100, 115, Monument.
   Rabatt fra 5% til 50% av lånebeløpet (maks €75.000).
   Rabatt utbetales ETTER at sertifisert energirådgiver bekrefter resultat.
   Belønner resultat, ikke intensjon. Obligatorisk energirådgiver i søknadsprosessen.
   Kan implementeres i Norge via Enovas eksisterende energirådgivernettverk.

9. NEDERLANDSK BESLUTNINGSFRIST MED SANKSJONER
   Ny miljølov (jan 2024): Myndigheter MÅ svare innen 8 uker på byggesøknader.
   Ved oversittelse: bøter. Danmark: samlet hele tillatelsesprosessen i én lov.
   Adresserer IEAs identifiserte hovedhindring: søknadsprosesser tar for lang tid.

═══ STABILISERINGSMEKANISMEN: IDEER SOM BLE VURDERT OG FORKASTET ═══

10. KLIMAINVESTERINGSFONDET / NORFUND
    Vurdert: Koble Sjokkfondets midler til internasjonal fornybar via Norfund.
    Forkastet: For lang kausal kjede. Solceller i Sør-Afrika hjelper ikke
    norske husholdninger under en Hormuz-krise. Bryter disiplinregelen.
    Norfund bør oppskaleres, men argumentet bør stå på egne ben.
    Stortinget vedtok oppskalering juni 2025, regjeringen fulgte ikke opp.
    Klimainvesteringsfondet: 5,6 mrd investert, unngår 17,6 Mt CO₂/år,
    10x mobilisering. Kjempesuksess — men feil instrument for Sjokkfondet.

11. GRØNN REINVESTERING UNDER AKTIVERING (Alternativ C)
    Vurdert: Investere i fornybar samtidig som fondet stabiliserer.
    Forkastet: Fire grunner —
    a) Etterspørselskonflikt under prissjokk
    b) Motsyklisk timing favoriserer investering ETTER sjokk
    c) Politisk disiplin — press for å holde fondet aktivt
    d) Selvkorrigerende logikk krever sekvensiell aktivering
    Disiplinregelen ble lovfestet som konsekvens av denne analysen.

12. EGEN KOMMUNEKANAL
    Vurdert: Dedikert stabiliseringskanal for kommuner med kraft-merinntektsjustering.
    Forkastet: Scope creep. Kommuner dekkes allerede av avgiftslette (som
    strømforbrukere) og næringshjelp (som arbeidsgivere). Presisering, ikke
    ny mekanisme. Kraft-merinntektsjustering = skjønnsmessig, inviterer lobbying.
    "Stoltenberg-testen": Kommunene har rammetilskuddssystemet. Sjokkfondet
    bør løse markedssvikt, ikke budsjetteringsproblemer.

═══ STABILISERINGSMEKANISMEN: VIRKEMIDLER SOM BØR UTREDES ═══

12b. LEIEPRISBESKYTTELSE VED ENERGIPRISSJOKK
    Bakgrunn: Eksponeringsanalysen viser at 92 % av økonomisk utsatte
    husholdninger er leietakere. Renteeffekten treffer dem indirekte gjennom
    leiepriser, men Sjokkfondet har ingen mekanisme for dette.
    Internasjonal erfaring: Spania innførte leietak under energikrisen 2022
    (maksimalt 2 % årlig økning). Flere EU-land vurderte lignende tiltak.
    Mulig Sjokkfond-mekanisme: Midlertidig begrensning av leieøkninger
    (f.eks. KPI-tak eller fast prosentsats) ved aktivert sjokkfond.
    Utfordringer: Kan redusere utleiertilbudet på sikt. Krever juridisk
    hjemmel (husleieloven). Vanskelig grenseflate mot permanent boligpolitikk.
    Status: Ikke utredet. Identifisert som hull i eksponeringsanalysen.
    Kilde: Spania Real Decreto-ley 11/2022; eksponeringsanalyse R fotnote 1.

12c. STRØMPRISSKJERMING FOR KOMMUNER
    Bakgrunn: Kommuner uten krafteierskap har Høy E-eksponering men mottar
    kun avgiftslette, ikke strømprisskjerming som husholdninger. Skoler,
    sykehjem, barnehager er lovpålagte — kommuner kan ikke kutte seg ut av
    kostnadsøkningen.
    Mulig mekanisme: Utvide strømprisskjerming til kommunale bygg, eller
    egen kompensasjonsordning for kommuner ved aktivert sjokkfond.
    Utfordring: Scope creep — kommuner har rammetilskuddssystemet.
    Identifisert i: Eksponeringsanalyse E/S, fotnote 2.

12d. STRUKTURELL DRIVSTOFFKOMPENSASJON FOR FISKEFLÅTEN OG OFF-ROAD
    Bakgrunn: Fiskeri (Ed) har Svært høy eksponering — diesel opptil 50 %
    av driftskostnader for pelagisk trål. Ingen reelle alternativer til
    fossil drivstoff (substitusjonsevne = ingen). Driftsmarginer halvert i
    2022. Kystrekeflåten fikk ad hoc drivstofftilskudd (4,50 kr/liter,
    NFD 2024). Landbruk/bygg/anlegg (Ec) har lignende problem: off-road
    diesel har svært lav avgiftsandel, og avgiftslette har derfor liten
    effekt. Elektriske alternativer (traktorer, gravemaskiner) i tidlig fase.
    Mulig mekanisme: Formalisert drivstofftilskudd ved aktivert sjokkfond
    for Ed (marin gasolje) og Ec (off-road diesel), utover generell
    avgiftslette. Kobles til CO₂-kompensasjonsordningen for fiskeri.
    Utfordring: Global dieselpris utenfor norsk kontroll — avgiftslette
    kompenserer kun norsk avgiftsdel, ikke prisøkningen.
    Kilde: Fiskebåt 2022; Garantikassen; eksponeringsanalyse fotnote 8
    og E-underkategorier (seksjon 2.4).

12e. IMPORTPRISMEKANISME (MAT, GJØDSEL, FÔR)
    Bakgrunn: I-analysen viser at fem aktører har Høy importeksponering
    (lavinntekt via mat, fiskeri via diesel/fôr, landbruk via gjødsel,
    havbruk via fôr, transport via diesel). Sjokkfondet har ingen mekanisme
    for importerte priser. Ca. 60 % av matforbruket importert (NIBIO 2024).
    Mulige mekanismer: Midlertidig avgiftskutt på matvarer, importsubsidie
    for kritiske innsatsvarer (gjødsel, fiskefôr), eller styrking av
    tollvernet som buffer.
    Utfordringer: Administrativt krevende. Risiko for å subsidiere
    utenlandske produsenter. Matpriser er globalt bestemt.
    Status: Ikke utredet. Identifisert i eksponeringsanalyse I.

12f. AUTOMATISK INFLASJONSSUPPLEMENT FOR PENSJONISTER/TRYGDEDE
    Bakgrunn: Trygdeoppgjøret justerer med opptil 12 mnd forsinkelse.
    1,5 millioner berørt. Aleneboende minstepensjonister har Moderat-høy
    eksponering men kompensasjonen kommer for sent.
    Mulig mekanisme: Automatisk engangstilskudd til pensjonister/trygdede
    ved aktivering av sjokkfond, som forskudd på neste trygdeoppgjør.
    Utfordring: Dobbeltutbetaling — må motregnes i neste trygdeoppgjør.
    Identifisert i: Eksponeringsanalyse fotnote 7, S-analyse pensjonister.

12g. SAMORDNING MED NORGES BANK (R RENTEKANAL)
    Bakgrunn: Sjokkfondets viktigste makroøkonomiske effekt er å gi Norges
    Bank rom for mildere rentebane ved å dempe energidrevet inflasjon. Men
    denne effekten avhenger av at Norges Bank faktisk tar hensyn til fondet
    i sin rentevurdering. Uten samordning er Sjokkfondets R-effekt tapt.
    Per-kanal-analysen viser at R er kanalen der Sjokkfondet og rente-
    politikk krever samordning (type III) for barnefamilier, kommuner,
    fiskeri, SMB og middels inntekt.
    Mulig mekanisme: Norges Bank inkluderer Sjokkfondets aktivering som
    variabel i sin inflasjonsmodell. Eller: formelt brev fra
    Finansdepartementet ved aktivering, analogt til avviksforklaring.
    Utfordring: Norges Banks uavhengighet. Samordning ≠ instruksjon.
    Status: Ikke utredet. Identifisert i per-kanal-interaksjonsanalysen.

═══ SJOKKINDEKSEN: MULIGE FORBEDRINGER ═══

13. TIDSDIMENSJON I TRIGGEREN
    Idé: Vekt prisendring over ulike tidshorisonter (1 uke, 1 mnd, 3 mnd)
    for å fange både akutte sjokk og vedvarende prispress.
    Status: Konseptuell. Krever backtesting mot historiske sjokk.

14. MASKINLÆRING FOR SJOKK-KLASSIFISERING
    Tsetlin Machine dokumentert som separat, ikke-integrert alternativ.
    Kan brukes til å klassifisere sjokk som tilbuds- vs. etterspørselsdrevet
    i sanntid, som input til fagrådet.
    Status: Teknisk mulig. For tidlig for policymodell. Se egen dokumentasjon.

15. TILBUDS- VS. ETTERSPØRSELSDISKRIMINERING I TRIGGEREN
    Bakgrunn: Kilian (2009) viser at tilbuds- og etterspørselsdrevne
    energiprissjokk krever ulik respons. Dagens sjokkindeks måler prisnivå
    og volatilitet — den skiller ikke mellom årsaker. Risiko: indeksen kan
    trigge ved etterspørselsdrevet prisøkning (overopphetet økonomi), der
    renten er riktig verktøy og Sjokkfondet er feil verktøy. Aktivering
    i feil scenario undergraver troverdigheten og kan forsterke inflasjon.
    Mulig mekanisme: Supplerende indikator i steg 2 (fagrådet) som vurderer
    om sjokket er tilbuds- eller etterspørselsdrevet, f.eks. basert på:
    global oljepris vs. norsk etterspørsel, kapasitetsutnyttelse, importpris-
    utvikling, lagerbeholdninger. Fagrådet kan allerede gjøre dette
    skjønnsmessig, men en formalisert sjekkliste styrker kvaliteten.
    Alternativ: Bygge inn tilbuds/etterspørsel-signal direkte i indeksen
    (f.eks. vekte opp sjokk der global pris driver vs. der norsk etterspørsel
    driver). Kobles til punkt 14 (Tsetlin Machine).
    Kilde: Kilian (2009) «Not All Oil Price Shocks Are Alike», AER.
    Status: Ikke utredet. Identifisert i R-analysen av eksponeringsanalysen.

16. FORMELT AKTIVERINGSVARSEL TIL NORGES BANK
    Bakgrunn: Sjokkfondets viktigste makroøkonomiske effekt er å dempe den
    tilbudsdrevne komponenten av prisstigning, slik at Norges Bank kan
    moderere renteresponsen. Men denne effekten realiseres bare dersom
    Norges Bank faktisk tar hensyn til Sjokkfondets aktivering i sin
    inflasjonsprognose. Uten et formelt signal er R-effekten tapt.
    Mulig mekanisme: Ved aktivering av Sjokkfondet sender Finansdepartementet
    et formelt brev til Norges Bank som beskriver: (a) hvilke tiltak som er
    aktivert, (b) estimert inflasjonsdemping fra tiltakene, (c) varighet.
    Analogt til Finansdepartementets avviksforklaring ved avvik fra
    handlingsregelen. Norges Bank er ikke bundet, men har formelt grunnlag
    for å justere prognosen.
    Forskjell fra 12g: 12g beskriver generell samordning. Punkt 16 er en
    konkret protokoll — et brev med kvantifisert inflasjonseffekt.
    Utfordring: Norges Banks uavhengighet. Brevet må informere, ikke
    instruere. Juridisk: forskrift vs. sedvane.
    Kilde: Kilian (2009); eksponeringsanalyse observasjon 6.
    Status: Ikke utredet.

17. DIFFERENSIERT SJOKKINDEKS FOR ELEKTRISITET OG PETROLEUM
    Bakgrunn: E-analysen (eksponeringsanalyse seksjon 2.4) viser at
    elektrisitet (Ea) og petroleumsprodukter (Eb-Ed) har ulike
    prisdrivere (hydrologi/markedskobling vs. global råolje/raffinering),
    rammer ulike aktører, og krever ulike virkemidler. Dagens sjokkindeks
    aggregerer «energipris» uten å skille type. Konsekvens: Samme
    indeksverdi kan skjule fundamentalt ulike sjokk —
    strømsjokk (2022-type, rammer Sør-Norge, husholdninger) vs.
    oljesjokk (Hormuz-type, rammer fiskeri, transport, nasjonalt).
    Mulig mekanisme: Beregne separate delindekser for elektrisitet
    og petroleum. Sjokkfondets virkemiddelpakke kan da tilpasses sjokk-
    typen: Ea-sjokk → strømprisskjerming dominerer. Eb-Ed-sjokk →
    avgiftslette og evt. drivstofftilskudd dominerer. Hybridsjokk
    (begge stiger, som i 2022) → full pakke.
    Utfordring: Økt kompleksitet i sjokkindeksen. Kobles til punkt 15
    (tilbuds/etterspørsel-diskriminering) — et Ea-sjokk kan være
    tilbudsdrevet (lav nedbør) eller etterspørselsdrevet (kald vinter).
    Kilde: Kilian (2008) seksjon 2.3; eksponeringsanalyse seksjon 2.4.
    Status: Ikke utredet. Identifisert i E-segmenteringsanalysen.

18. MIDLERTIDIG MVA-REDUKSJON PÅ BASISMATVARER (Ia)
    ⚠️ KUNNSKAPSBASERT ADVARSEL: IMF og OECD fraråder mva-kutt som
    kriseverktøy. Untargeted (gir like mye til rike som fattige),
    dyrt, og 77 % av OECDs fiskale krisekostnad 2022-23 gikk til
    slike brede pristiltak — ikke fordi de var gode, men fordi
    regjeringene manglet forhåndsdesignet alternativ (OECD Economic
    Policy Paper No. 32, juni 2023). Sjokkfondet *har* det
    alternativet (B1 Levekostnadstilskudd). Mva-kutt beholdes i
    idébank men anbefales IKKE som Sjokkfond-tiltak.
    Bakgrunn: Sjokkfondet har ingen mekanisme for importerte matpriser.
    60 % av mat importert. Importerte jordbruksvarer +12,9 % i 2023
    (NOU 2024:6). Matpriser rammer lavinntekt hardest som budsjettandel.
    Mulig mekanisme: Midlertidig reduksjon av matvare-mva (nå 15 %) til
    f.eks. 8 % eller 0 % ved aktivert sjokkfond. Automatisk trigger,
    sunset ved deaktivering. Spania 2022/2026: mva redusert fra 21 % til
    10 % på mat, gass, diesel og elektrisitet.
    Fordel: Enkel å implementere (Skatteetaten), umiddelbar effekt,
    progressiv i effekt (mat = høyere budsjettandel for lavinntekt).
    Utfordring: Kostbar (~15 mrd/år ved halvering). Kan absorberes av
    dagligvarekjeder (pristransparens-problemet). Udifferensiert.
    Bruegel/IMF: bare 27 % av 2022-tiltakene var målrettet — mva-kutt
    var blant de minst målrettede.
    Kilde: Spania Real Decreto-ley; IMF WP/2022/262; NOU 2024:6;
    IMF WP/2023/074; OECD EPP No. 32 (2023).
    Status: Vurdert, lagt i idébank med advarsel. B1 Levekostnadstilskudd
    er det foretrukne alternativet. Kan vurderes som supplement av
    Stortinget utenfor fondet ved ekstreme sjokk.

19. MIDLERTIDIG TOLLREDUKSJON PÅ KRITISKE INNSATSVARER (Ib)
    Bakgrunn: Gjødselprisen tredoblet i 2022. Fiskefôr ~60 % importert.
    Sjokkfondet har ingen mekanisme for importerte innsatsvarer.
    Mulig mekanisme: Midlertidig suspendering eller reduksjon av
    importtoll og avgifter på gjødsel og fiskefôr ved aktivert sjokkfond.
    Begrenset produktomfang — kun innsatsvarer der energiprisen er en
    vesentlig del av produksjonskostnaden (gjødsel via Haber-Bosch,
    fôr via soy/korn). Administreres av Tolletaten.
    Fordel: Målrettet, treffer produsenter direkte.
    Utfordring: Begrenset effekt — norsk toll på gjødsel er allerede lav.
    Kan kreve WTO-notifikasjon. Viktigere for fôr der tollsatser er
    høyere. Norsk tollvern på jordbruksvarer er politisk sensitivt.
    Kilde: Eksponeringsanalyse Ib.
    Status: Vurdert i steg 6, lagt i idébank (ikke TODO) pga. begrenset
    effekt og politisk kompleksitet.

20. LOVFESTET RAPPORTERINGSPLIKT FOR FAGRÅDET (R)
    Bakgrunn: Sjokkfondets R-effekt (gi Norges Bank rom for mildere
    rente) krever at Norges Bank har informasjon om Sjokkfondets
    inflasjonsdemping. Formelt aktiveringsvarsel (punkt 16, nå TODO)
    er første steg. Punkt 20 går lenger.
    Mulig mekanisme: Lovfest at Sjokkfondets fagråd publiserer
    kvartalsvise rapporter med beregnet inflasjonseffekt av tiltakene.
    Norges Bank kan bruke rapporten som input i pengepolitisk rapport —
    ikke fordi de er pålagt det, men fordi informasjonen er offentlig
    tilgjengelig og faglig forankret.
    Fordel: Transparent, troverdig, ingen instruksjon.
    Utfordring: Fagrådet belastes med kvantifisering som er vanskelig
    (inflasjonsprognoser er usikre). Risiko for politisering.
    Kilde: Eksponeringsanalyse R-analyse, observasjon 6.
    Status: Langsiktig styrking. Forutsetter at punkt 16 (aktiverings-
    varsel) implementeres først.

21. FUEL PASS — DIGITALT TRANSPORTKORT (Eb, ALTERNATIV A)
    Bakgrunn: Hellas innførte Fuel Pass april 2026 — digitalt kort med
    fast beløp (€50-60/bil, €30-35/motorsykkel) for bruk på bensin-
    stasjoner, ladestasjoner, kollektivtransport og taxi. Plattform
    for registrering åpnet 6. april 2026 (KeepTalkingGreece).
    Mulig mekanisme: Norsk variant via BankID-registrering. Fast beløp
    lastet på digitalt kort eller app. Kan brukes ved pumpe, ladestasjon,
    Ruter/AtB/Kolumbus etc.
    Fordel: Øremerket transport — kan ikke brukes til annet.
    Utfordring: Krever integrasjon med drivstoffkjeder, ladenettverk
    OG kollektivselskaper — tre ulike betalingssystemer. Registrering
    nødvendig (Hellas-modell krever aktiv påmelding). Infrastruktur-
    kostnad og implementeringstid høyere enn direkte utbetaling.
    Kilde: KeepTalkingGreece april 2026; eksponeringsanalyse Eb-analyse.
    Status: Vurdert, forkastet til fordel for direkte transporttilskudd
    (enklere, raskere, ingen ny infrastruktur). Kan vurderes som
    langsiktig forbedring dersom øremerking viser seg nødvendig.

22. BILEIERTILSKUDD VIA KJØRETØYREGISTER (Eb, ALTERNATIV B)
    Bakgrunn: Kombinasjon av Skatteetaten (inntekt) og Statens vegvesen
    (kjøretøyregister) for å identifisere lavinntekt med registrert bil.
    Mulig mekanisme: Automatisk utbetaling til lavinntekt med bil.
    Beløp differensiert etter biltype (fossil vs. elbil vs. hybrid).
    Fordel: Mer målrettet enn generelt transporttilskudd — treffer
    kun de med dokumentert bilkostnad. To registre som allerede finnes.
    Utfordring: Ekskluderer lavinntekt uten bil — de betaler også
    økte transportkostnader (kollektiv, taxi, samkjøring). Straffer
    de som ikke har råd til bil. Krever registerkryssing mellom to
    etater. Differensiering etter biltype kan straffe de som har
    strukket seg for elbil.
    Status: Vurdert, forkastet. Transporttilskudd via Skatteetaten
    alene er enklere, rettferdigere og transportnøytralt.

23. UTVIDET BRENSELTILSKUDD / FUEL ALLOWANCE (Eb, ALTERNATIV C)
    Bakgrunn: Irland forlenget sitt fuel allowance med fire uker under
    krisen mars 2026 (RTÉ). Eksisterende ordning for lavinntekt som
    allerede mottar sosialhjelp eller bostøtte.
    Mulig mekanisme: Norsk variant via NAV — utvid bostøtte eller
    sosialhjelp med et transporttillegg ved aktivert sjokkfond.
    Fordel: Bruker eksisterende NAV-infrastruktur og mottakerlister.
    Utfordring: Treffer kun de som allerede mottar NAV-ytelser —
    mange i lavinntekt (desil 1-3) mottar verken sosialhjelp eller
    bostøtte. Smalere dekningsgrad enn Skatteetaten-basert tilskudd.
    Administrativ forsinkelse via NAV-saksbehandling.
    Kilde: RTÉ mars 2026; TheJournal.ie mars 2026.
    Status: Vurdert, forkastet pga. smalere dekning. NAV-kanalen
    kan brukes som supplement for de mest sårbare, men ikke som
    primærmekanisme.
